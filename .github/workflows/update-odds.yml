name: update-odds

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-odds
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch & write odds
        run: node update-odds.mjs
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit changes
        id: commit
        run: |
          git config user.name  "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          git add odds/
          if git diff --staged --quiet; then
            echo "no changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "update odds $(date -u +%FT%TZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge jsDelivr CDN
        if: steps.commit.outputs.changed == 'true'
        run: |
          for f in odds/*.json; do
            curl -s "https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/$f" > /dev/null
            echo "purged $f"
          done
